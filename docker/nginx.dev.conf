# Standalone nginx для тестовой среды (Cursor Cloud / хост без docker run)
worker_processes 1;
error_log /tmp/datagent-nginx-error.log warn;
pid /tmp/datagent-nginx.pid;

events {
  worker_connections 128;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /tmp/datagent-nginx-access.log;
  error_log /tmp/datagent-nginx-error.log warn;
  client_body_temp_path /tmp/nginx-body;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;
  sendfile on;

  server {
    listen 0.0.0.0:8080 default_server;
    server_name localhost _;
    root /workspace;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    # Dev: без долгого кэша — сразу видны правки CSS/JS/иконок
    location /assets/ {
      expires -1;
      add_header Cache-Control "no-store, must-revalidate" always;
    }

    location = /index.html {
      expires -1;
      add_header Cache-Control "no-store, must-revalidate" always;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
}
