name: Container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t datagent-landing:ci .

      - name: Smoke test
        run: |
          docker run -d --name landing-smoke -p 18080:80 datagent-landing:ci
          sleep 2
          curl -fsS http://127.0.0.1:18080/ | grep -q 'Datagent'
          curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/assets/css/tokens.css | grep -q '200'
          docker stop landing-smoke

