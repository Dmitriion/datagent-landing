services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
    image: datagent-landing:local
    ports:
      - "0.0.0.0:${LANDING_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
